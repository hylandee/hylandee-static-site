<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authentication</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><a href="../index.html" class="home-link">Hylandee</a></h1>
            <nav id="nav">
                <button id="signup-tab" class="tab active" data-tab="signup">Sign Up</button>
                <button id="login-tab" class="tab" data-tab="login">Login</button>
                <button id="profile-link" class="tab hidden" type="button">My Profile</button>
            </nav>
        </header>
        <main>
            <div id="signup" class="form-section">
                <h2>Create Account</h2>
                <form id="signup-form">
                    <div class="form-group">
                        <label for="signup-username">Username</label>
                        <input type="text" id="signup-username" required>
                        <small>3-50 characters, letters, numbers, underscores, hyphens only</small>
                    </div>
                    <div class="form-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" required>
                        <small>At least 8 characters, must include uppercase, lowercase, and a number/symbol</small>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Sign Up</button>
                    </div>
                </form>
            </div>
            <div id="login" class="form-section hidden">
                <h2>Login</h2>
                <form id="login-form">
                    <div class="form-group">
                        <label for="login-username">Username</label>
                        <input type="text" id="login-username" required>
                    </div>
                    <div class="form-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary">Login</button>
                    </div>
                </form>
            </div>
            <div class="messages" id="messages"></div>
        </main>
    </div>
    <script src="auth.js"></script>
</body>
</html>
